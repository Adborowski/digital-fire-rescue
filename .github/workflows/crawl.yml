name: Digitalfire Archiver

on:
  # Runs every 6 hours. Each job runs for at most 6h before GitHub kills it,
  # so we instruct fetch.py to stop after 5h 45m (--max-duration 20700),
  # leaving 15 minutes to save state before the hard cap.
  schedule:
    - cron: "0 */6 * * *"
  # Manual trigger: "workflow_dispatch" lets you kick it off immediately from
  # the Actions tab -- useful for the first run and for one-off resumption.
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      # Needed for the `gh` CLI to create and update the release asset that
      # stores persistent state between runs (no external bucket required).
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # ── 3. Restore previous state ─────────────────────────────────────────
      #   We store the crawl state (SQLite db + raw HTML) as an asset on a
      #   dedicated GitHub Release ("archive"). No external accounts or
      #   secrets needed -- GITHUB_TOKEN is automatically available.
      #
      #   First run: the release + asset don't exist yet, so this step exits 0
      #   with a warning and we start fresh (discover creates a new DB).
      - name: Restore archive state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/raw_html data/assets data/db data/logs
          if gh release download archive --pattern "data.tar.gz" --dir /tmp 2>/dev/null; then
            echo "Restoring previous state..."
            tar -xzf /tmp/data.tar.gz -C .
          else
            echo "No previous state found -- starting fresh."
          fi

      # ── 4. Discover ───────────────────────────────────────────────────────────
      #   Cheap (~23 requests, no delay). Updates the pages table with any
      #   new/changed URLs since last run. Already-fetched pages keep their
      #   status, so this is safe to re-run every time.
      - name: Discover URLs
        run: PYTHONPATH=src python -m digitalfire_archive.discover

      # ── 5. Fetch ─────────────────────────────────────────────────────────────
      #   Respects robots.txt Crawl-delay: 20 (one request every 20 seconds,
      #   single-threaded -- identical behaviour to running locally, just
      #   hosted on GitHub's infrastructure instead of your laptop).
      #   Stops gracefully 15 minutes before GitHub's 6-hour job limit.
      - name: Fetch pages
        # --fallback-wayback: try the live site first (gets the most current
        # version when the site is up); automatically falls back to
        # web.archive.org if the live page returns a soft-404 or times out.
        # Default delay is 20s (robots.txt crawl-delay for the live site);
        # override via the CRAWL_DELAY_SECONDS repository variable if Tony
        # grants faster access, or set to 3 if running purely via Wayback.
        run: |
          PYTHONPATH=src python -m digitalfire_archive.fetch \
            --fallback-wayback \
            --delay ${{ vars.CRAWL_DELAY_SECONDS || 20 }} \
            --max-duration 20700

      # ── 6. Extract + assets ──────────────────────────────────────────────────
      - name: Extract structured data
        run: PYTHONPATH=src python -m digitalfire_archive.extract

      - name: Download assets (images)
        run: PYTHONPATH=src python -m digitalfire_archive.assets --delay 1.0

      # ── 7. Verify ─────────────────────────────────────────────────────────────
      - name: Verify completeness
        run: PYTHONPATH=src python -m digitalfire_archive.verify

      # ── 8a. Push stats to Vercel dashboard ────────────────────────────────────
      #   Add KV_REST_API_URL and KV_REST_API_TOKEN as repository secrets
      #   (exact names from your .env.local / Vercel → Storage → .env.local).
      #   Non-fatal if missing — crawler continues without dashboard update.
      - name: Push stats to dashboard
        if: always()
        env:
          KV_REST_API_URL:   ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: PYTHONPATH=src python -m digitalfire_archive.stats_push

      # ── 8. Save state ─────────────────────────────────────────────────────────
      #   Package the SQLite db and raw HTML into a tarball and upload it to
      #   the "archive" release, replacing the previous asset. Images from
      #   S3 are NOT included (they're re-downloadable via image URLs stored
      #   in the db), keeping the tarball manageable.
      - name: Save archive state
        if: always()   # save even if earlier steps partially failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release if it doesn't exist yet
          if ! gh release view archive &>/dev/null; then
            gh release create archive \
              --title "Digitalfire archive data" \
              --notes "Crawl state maintained by the 'crawl' workflow. Download data.tar.gz to resume locally." \
              --prerelease
          fi
          # Pack and upload (replaces the previous asset)
          tar -czf /tmp/data.tar.gz data/db data/raw_html data/logs
          gh release upload archive /tmp/data.tar.gz --clobber

      # ── 9. IA backstop (optional) ────────────────────────────────────────────
      #   Get free IA API keys at https://archive.org/account/s3.php and add
      #   them as repository secrets (IA_ACCESS_KEY, IA_SECRET_KEY).
      #   The script exits gracefully without them; the `if:` uses a repo
      #   *variable* (not a secret) because secrets can't appear in if conditions.
      #   Set ENABLE_IA_BACKSTOP = true in Settings → Variables → Actions to activate.
      - name: Internet Archive Save Page Now
        if: vars.ENABLE_IA_BACKSTOP == 'true'
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          PYTHONPATH=src python -m digitalfire_archive.ia_backstop --delay 2.0

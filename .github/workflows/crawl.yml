name: Digitalfire Archiver

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

concurrency:
  group: digitalfire-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 90         # hard ceiling; pipeline exits cleanly at 50 min
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      # ── 3. Restore state ─────────────────────────────────────────────────────
      #   Two assets on the release:
      #   • db.sqlite     — SQLite DB, uploaded every 100 pages by pipeline.py
      #   • raw_html.tar  — full HTML archive, uploaded once per job at the end
      #
      #   We always restore the DB first (most recent state), then layer the
      #   HTML files on top if available. After restore, `reconcile` resets any
      #   page that SQLite thinks is 'fetched' but whose HTML file is missing
      #   (because this runner is fresh). Those pages get re-fetched this run.
      - name: Restore archive state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/raw_html data/assets data/db data/logs

          # Restore the SQLite DB checkpoint first (small, always current)
          if gh release download archive --pattern "db.sqlite" --dir data/db 2>/dev/null; then
            echo "SQLite checkpoint restored"
          else
            echo "No SQLite checkpoint found -- starting fresh"
          fi

          # Restore the HTML files if available (large, may be from a previous job)
          if gh release download archive --pattern "raw_html.tar" --dir /tmp 2>/dev/null; then
            tar -xf /tmp/raw_html.tar -C .
            echo "HTML archive restored"
          else
            echo "No HTML archive found -- will re-fetch as needed"
          fi

      # ── 4. Discover + reconcile ───────────────────────────────────────────────
      - name: Discover URLs
        run: PYTHONPATH=src python -m digitalfire_archive.discover

      - name: Reconcile (re-queue pages missing HTML files)
        run: |
          PYTHONPATH=src python -c "
          from digitalfire_archive.discover import reconcile
          n = reconcile()
          print(f'Reconciled {n} pages → pending')
          "

      # ── 5. Pipeline (fetch → extract → assets → checkpoint) ─────────────────
      #   Runs the per-page loop. After every 100 pages it uploads just the
      #   SQLite DB to the GitHub Release so that cancellation never loses more
      #   than ~100 pages (33 minutes at 20s/page).
      #
      #   step timeout (55 min) > --max-duration (50 min = 3000s) so Python
      #   always exits cleanly before GH kills the step. If Python somehow
      #   hangs, the step timeout takes over and the job continues to Save state.
      - name: Run pipeline
        timeout-minutes: 55
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KV_REST_API_URL:   ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: |
          PYTHONPATH=src python -m digitalfire_archive.pipeline \
            --fallback-wayback \
            --delay ${{ vars.CRAWL_DELAY_SECONDS || 20 }} \
            --max-duration 3000 \
            --checkpoint-every 100

      # ── 6. Save full HTML archive ─────────────────────────────────────────────
      #   Always runs (even if pipeline was cut short). Saves raw HTML + logs
      #   as a separate, larger release asset. The SQLite DB was already saved
      #   mid-run by pipeline.py, so this is just the HTML backup.
      - name: Save HTML archive
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view archive &>/dev/null; then
            gh release create archive \
              --title "Digitalfire archive data" \
              --notes "Maintained by the crawl workflow." \
              --prerelease
          fi
          tar -cf /tmp/raw_html.tar data/raw_html data/logs
          gh release upload archive /tmp/raw_html.tar --clobber

      # ── 7. Final stats push ───────────────────────────────────────────────────
      #   pipeline.py already pushes stats every checkpoint, but this catches
      #   the final partial batch and updates the dashboard at end-of-run.
      - name: Push stats to dashboard
        if: always()
        env:
          KV_REST_API_URL:   ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: PYTHONPATH=src python -m digitalfire_archive.stats_push

      # ── 8. Verify ─────────────────────────────────────────────────────────────
      - name: Verify completeness
        if: always()
        run: PYTHONPATH=src python -m digitalfire_archive.verify

      # ── 9. IA backstop (optional) ────────────────────────────────────────────
      - name: Internet Archive Save Page Now
        if: vars.ENABLE_IA_BACKSTOP == 'true'
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: PYTHONPATH=src python -m digitalfire_archive.ia_backstop --delay 2.0

name: Digitalfire Archiver

on:
  # Every 2 hours. Each job is capped at ~90 minutes total, so there's
  # always a 30-minute gap between runs -- no overlap, no queuing issues.
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

# Prevent two runs colliding on the GitHub Release state file.
concurrency:
  group: digitalfire-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    # Hard ceiling. Step-level timeouts below mean we should always finish
    # well inside this, but this is the safety net.
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # ── 3. Restore previous state ─────────────────────────────────────────
      - name: Restore archive state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/raw_html data/assets data/db data/logs
          if gh release download archive --pattern "data.tar.gz" --dir /tmp 2>/dev/null; then
            echo "Restoring previous state..."
            tar -xzf /tmp/data.tar.gz -C .
          else
            echo "No previous state found -- starting fresh."
          fi

      # ── 4. Discover ──────────────────────────────────────────────────────────
      - name: Discover URLs
        run: PYTHONPATH=src python -m digitalfire_archive.discover

      # ── 5. Fetch ─────────────────────────────────────────────────────────────
      #   Step timeout (55 min) > Python --max-duration (50 min) so Python exits
      #   cleanly first. If somehow Python hangs, GHA's step timeout kills the
      #   step and the job continues to Extract → Save state below.
      - name: Fetch pages
        timeout-minutes: 55
        run: |
          PYTHONPATH=src python -m digitalfire_archive.fetch \
            --fallback-wayback \
            --delay ${{ vars.CRAWL_DELAY_SECONDS || 20 }} \
            --max-duration 3000

      # ── 6. Extract ───────────────────────────────────────────────────────────
      - name: Extract structured data
        run: PYTHONPATH=src python -m digitalfire_archive.extract

      # ── 7. Save state (always) ───────────────────────────────────────────────
      #   Runs even if Fetch or Extract failed/timed out. This is the most
      #   important step -- it persists everything fetched so far so the next
      #   run doesn't start from zero. Keep it before Assets so a slow image
      #   download can never prevent HTML from being saved.
      - name: Save archive state
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view archive &>/dev/null; then
            gh release create archive \
              --title "Digitalfire archive data" \
              --notes "Crawl state maintained by the crawl workflow." \
              --prerelease
          fi
          tar -czf /tmp/data.tar.gz data/db data/raw_html data/logs
          gh release upload archive /tmp/data.tar.gz --clobber

      # ── 8. Download images ───────────────────────────────────────────────────
      #   Runs after save so a slow/interrupted image batch never blocks the
      #   HTML save. Images live on S3 and can be re-downloaded any time, so
      #   losing a partial batch is harmless.
      - name: Download assets (images)
        timeout-minutes: 10
        if: always()
        run: |
          PYTHONPATH=src python -m digitalfire_archive.assets \
            --delay 0.5 \
            --max-duration 540

      # ── 9. Push stats to dashboard ───────────────────────────────────────────
      #   Add KV_REST_API_URL and KV_REST_API_TOKEN as repository secrets:
      #   Settings → Secrets and variables → Actions → New repository secret.
      #   Copy both values directly from your .env.local file.
      - name: Push stats to dashboard
        if: always()
        env:
          KV_REST_API_URL:   ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: PYTHONPATH=src python -m digitalfire_archive.stats_push

      # ── 10. Verify ───────────────────────────────────────────────────────────
      - name: Verify completeness
        if: always()
        run: PYTHONPATH=src python -m digitalfire_archive.verify

      # ── 11. IA backstop (optional) ───────────────────────────────────────────
      #   Set ENABLE_IA_BACKSTOP = true in Settings → Variables → Actions.
      #   Add IA_ACCESS_KEY + IA_SECRET_KEY as secrets if you have them.
      - name: Internet Archive Save Page Now
        if: vars.ENABLE_IA_BACKSTOP == 'true'
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          PYTHONPATH=src python -m digitalfire_archive.ia_backstop --delay 2.0
